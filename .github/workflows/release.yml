name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish, for example v0.0.2-beta1"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and sign app
        run: npm run tauri -- build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Prepare release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleDir = "src-tauri/target/release/bundle/nsis"
          $assetsDir = "release-assets"
          New-Item -ItemType Directory -Path $assetsDir -Force | Out-Null

          # Copy installer and signature
          Copy-Item "$bundleDir/*.exe" $assetsDir/
          $sigFile = Get-ChildItem "$bundleDir/*.sig" | Select-Object -First 1
          if ($sigFile) { Copy-Item $sigFile.FullName $assetsDir/ }

          # Generate latest.json for the updater
          $conf = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = $conf.version
          $sig = if ($sigFile) { Get-Content $sigFile.FullName -Raw } else { "" }
          $exeName = (Get-ChildItem "$assetsDir/*.exe" | Select-Object -First 1).Name
          $encodedExeName = [Uri]::EscapeDataString($exeName)
          $tag = "${{ github.ref_name }}"
          $repo = "${{ github.repository }}"
          $downloadUrl = "https://github.com/$repo/releases/download/$tag/$encodedExeName"
          $pubDate = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")

          $latestJson = @{
            version = $version
            notes = "Release $tag"
            pub_date = $pubDate
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url = $downloadUrl
              }
            }
          } | ConvertTo-Json -Depth 5

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText("$PWD/$assetsDir/latest.json", $latestJson, $utf8NoBom)

          # List what we have
          Get-ChildItem $assetsDir -Recurse | ForEach-Object {
            Write-Host "$($_.FullName) ($($_.Length) bytes)"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Usage-Windows
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(inputs.release_tag || github.ref_name, 'beta') || contains(inputs.release_tag || github.ref_name, 'alpha') || contains(inputs.release_tag || github.ref_name, 'rc') }}
