name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish, for example v0.0.2-beta1"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app
        run: npm run tauri -- build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCode-Usage-Windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          prerelease: ${{ contains(inputs.release_tag || github.ref_name, 'beta') || contains(inputs.release_tag || github.ref_name, 'alpha') || contains(inputs.release_tag || github.ref_name, 'rc') }}
